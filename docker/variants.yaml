# Docker variant definitions for DataEval Workflows
# Used by `nox -s docker-gen` to render Dockerfile.<variant> from Dockerfile.j2
#
# To add a new CUDA variant:
#   1. Add the variant key below with build_base_image and prod_base_image
#   2. Ensure pyproject.toml has the matching extra and pytorch index
#   3. Run `nox -s docker-gen` to generate the Dockerfile
#
# For CUDA variants, builder uses devel (has compiler/headers for wheel builds)
# and prod uses plain ubuntu (PyTorch/onnxruntime bundle their own CUDA libs).
# Match the Ubuntu version to the devel image's base.

# Pinned tool versions (shared across all variants)
uv_version: "0.10.12"
python_version: "3.12"

variants:
  cpu:
    build_base_image: "ubuntu:24.04"
    prod_base_image: "ubuntu:24.04"

    extras: ["all-cpu"]
    label_title: "DataEval Workflows (CPU)"
    label_description: "DataEval Workflows container - CPU variant"

  cu118:
    build_base_image: "nvidia/cuda:11.8.0-cudnn8-devel-ubuntu22.04"
    prod_base_image: "ubuntu:22.04"

    extras: ["all-cu118"]
    label_title: "DataEval Workflows (CUDA 11.8)"
    label_description: "DataEval Workflows container - CUDA 11.8 variant"

  cu124:
    build_base_image: "nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04"
    prod_base_image: "ubuntu:22.04"

    extras: ["all-cu124"]
    label_title: "DataEval Workflows (CUDA 12.4)"
    label_description: "DataEval Workflows container - CUDA 12.4 variant"

  cu128:
    build_base_image: "nvidia/cuda:12.8.1-cudnn-devel-ubuntu24.04"
    prod_base_image: "ubuntu:24.04"

    extras: ["all-cu128"]
    label_title: "DataEval Workflows (CUDA 12.8)"
    label_description: "DataEval Workflows container - CUDA 12.8 variant"

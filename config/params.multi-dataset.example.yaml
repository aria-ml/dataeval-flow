# =============================================================================
# Multi-Dataset Workflow Configuration Example
# =============================================================================
# Demonstrates how to configure multiple datasets with independent
# extractors, preprocessors, and selections using the
# sources/extractors composition pattern.
#
# yaml-language-server: $schema=params.schema.json
# =============================================================================

# -----------------------------------------------------------------------------
# DATASETS
# -----------------------------------------------------------------------------
datasets:
  - name: cifar10_train
    format: huggingface
    path: ./data/cifar10
    split: train

  - name: cifar10_test
    format: huggingface
    path: ./data/cifar10
    split: test

  - name: raw-photos
    format: image_folder
    path: /data/raw-photos
    recursive: false

  - name: classified-photos
    format: image_folder
    path: /data/classified-photos
    infer_labels: true

# -----------------------------------------------------------------------------
# PREPROCESSORS
# -----------------------------------------------------------------------------
preprocessors:
  - name: resnet_preprocess
    steps:
      - step: Resize
        params:
          size: [256, 256]
          antialias: true
      - step: CenterCrop
        params:
          size: [224, 224]
      - step: ToDtype
        params:
          dtype: float32
          scale: true
      - step: Normalize
        params:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]

  - name: basic_preprocess
    steps:
      - step: Resize
        params:
          size: [32, 32]

# -----------------------------------------------------------------------------
# SELECTIONS
# -----------------------------------------------------------------------------
selections:
  - name: first_5k
    steps:
      - type: Limit
        params:
          size: 5000

# -----------------------------------------------------------------------------
# SOURCES — Dataset + optional selection bundles
# -----------------------------------------------------------------------------
sources:
  - name: cifar10_train_full
    dataset: cifar10_train

  - name: cifar10_test_full
    dataset: cifar10_test

  - name: cifar10_train_5k
    dataset: cifar10_train
    selection: first_5k

  - name: raw_photos_full
    dataset: raw-photos

  - name: classified_photos_full
    dataset: classified-photos

# -----------------------------------------------------------------------------
# EXTRACTORS — Model type + params + optional preprocessor + batch_size
# -----------------------------------------------------------------------------
extractors:
  - name: resnet_extractor
    model: onnx
    model_path: "./resnet50-v2-7.onnx"
    output_name: "resnetv24_flatten0_reshape0"
    preprocessor: resnet_preprocess
    batch_size: 64

  - name: flat_extractor
    model: flatten
    batch_size: 64

# -----------------------------------------------------------------------------
# WORKFLOWS — Named workflow instances
# -----------------------------------------------------------------------------
workflows:
  - name: adaptive_clean
    type: data-cleaning
    outlier_method: adaptive
    outlier_flags:
      - dimension
      - pixel

  - name: thorough_clean
    type: data-cleaning
    outlier_method: modzscore
    outlier_flags:
      - dimension
      - pixel
      - visual

# -----------------------------------------------------------------------------
# TASKS — Lightweight composition by name
# -----------------------------------------------------------------------------
tasks:
  # Single source, flat extractor
  - name: clean_train
    workflow: adaptive_clean
    sources: cifar10_train_full
    extractor: flat_extractor

  # Multiple sources, shared extractor
  - name: clean_both
    workflow: adaptive_clean
    sources:
      - cifar10_train_full
      - cifar10_test_full
    extractor: flat_extractor

  # Different workflow, resnet extractor
  - name: clean_thorough
    workflow: thorough_clean
    sources:
      - cifar10_train_full
      - cifar10_test_full
    extractor: resnet_extractor

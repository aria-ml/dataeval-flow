# =============================================================================
# Multi-Dataset Workflow Configuration Example
# =============================================================================
# Demonstrates how to configure multiple datasets with independent
# models, preprocessors, and selections per dataset.
#
# Uses workflow instances to define workflow type + params once and
# reference them across tasks.
#
# yaml-language-server: $schema=params.schema.json
# =============================================================================

# -----------------------------------------------------------------------------
# DATASETS
# -----------------------------------------------------------------------------
datasets:
  - name: cifar10_train
    format: huggingface
    path: ./data/cifar10
    split: train

  - name: cifar10_test
    format: huggingface
    path: ./data/cifar10
    split: test

  - name: raw-photos
    format: image_folder
    path: /data/raw-photos
    recursive: false

  - name: classified-photos
    format: image_folder
    path: /data/classified-photos
    infer_labels: true

# -----------------------------------------------------------------------------
# MODELS
# -----------------------------------------------------------------------------
models:
  - name: resnet50
    extractor:
      type: onnx
      model_path: "./resnet50-v2-7.onnx"
      output_name: "resnetv24_flatten0_reshape0"

  - name: flat
    extractor:
      type: flatten

# -----------------------------------------------------------------------------
# PREPROCESSORS
# -----------------------------------------------------------------------------
preprocessors:
  - name: resnet_preprocess
    steps:
      - step: Resize
        params:
          size: [256, 256]
          antialias: true
      - step: CenterCrop
        params:
          size: [224, 224]
      - step: ToDtype
        params:
          dtype: float32
          scale: true
      - step: Normalize
        params:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]

  - name: basic_preprocess
    steps:
      - step: Resize
        params:
          size: [32, 32]

# -----------------------------------------------------------------------------
# WORKFLOWS — Named workflow instances
# -----------------------------------------------------------------------------
workflows:
  - name: adaptive_clean
    type: data-cleaning
    outlier_method: adaptive
    outlier_flags:
      - dimension
      - pixel

  - name: thorough_clean
    type: data-cleaning
    outlier_method: modzscore
    outlier_flags:
      - dimension
      - pixel
      - visual

# -----------------------------------------------------------------------------
# TASKS — Lightweight composition by name
# -----------------------------------------------------------------------------
tasks:
  # Single dataset, references a workflow instance
  - name: clean_train
    workflow: adaptive_clean              # ← reference workflow instance
    datasets: cifar10_train
    models: flat
    batch_size: 64

  # Multi-dataset with a shared model, same workflow instance
  - name: clean_both_shared_model
    workflow: adaptive_clean              # ← reuse the same instance
    datasets:
      - cifar10_train
      - cifar10_test
    models: flat
    batch_size: 64

  # Multi-dataset with per-dataset model mapping, different workflow instance
  - name: clean_both_per_dataset_model
    workflow: thorough_clean              # ← different instance
    datasets:
      - cifar10_train
      - cifar10_test
    models:
      cifar10_train: resnet50
      cifar10_test: flat
    preprocessors:
      cifar10_train: resnet_preprocess
      cifar10_test: basic_preprocess
    batch_size: 64

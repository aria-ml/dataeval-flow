# =============================================================================
# Pipeline Configuration
# =============================================================================
# Schema: PipelineConfig (see src/dataeval_flow/config/models.py)
# Copy to /data/config/params.yaml in container (or use --config CLI option)
#
# yaml-language-server: $schema=params.schema.json
# =============================================================================
#
# Configuration follows a define-once, reference-by-name pattern:
#
#   datasets:      → named dataset definitions
#   models:        → named model definitions (type + params)
#   preprocessors: → named preprocessing pipelines
#   selections:    → named selection pipelines
#   sources:       → dataset + optional selection bundles
#   extractors:    → model + optional preprocessor + batch_size bundles
#   workflows:     → named workflow instances (type + params)
#   tasks:         → lightweight composition by name
#
# Sources and extractors are composition layers that bundle related
# components. Tasks reference these by name — keeping tasks lightweight
# and configs centralized.

# -----------------------------------------------------------------------------
# LOGGING (optional)
# -----------------------------------------------------------------------------
# logging:
#   app_level: DEBUG      # dataeval_flow and container_run (DEBUG|INFO|WARNING|ERROR)
#   lib_level: WARNING    # third-party: torch, datasets, PIL (DEBUG|INFO|WARNING|ERROR)

# -----------------------------------------------------------------------------
# DATASETS
# -----------------------------------------------------------------------------
# Named dataset definitions. Sources reference these by name.
#
# datasets:
#   - name: my-dataset
#     format: huggingface        # huggingface | image_folder | coco | yolo
#     path: ./data/my-dataset
#     split: train               # HuggingFace only
#
#   - name: raw-photos
#     format: image_folder
#     path: /data/raw-photos
#     recursive: false
#
#   - name: classified-photos
#     format: image_folder
#     path: /data/classified-photos
#     infer_labels: true
#
#   - name: coco-train
#     format: coco
#     path: /data/coco-train
#     annotations_file: annotations.json
#     images_dir: images
#     classes_file: classes.txt
#
#   - name: yolo-train
#     format: yolo
#     path: /data/yolo-train
#     images_dir: images
#     labels_dir: labels
#     classes_file: classes.txt

# -----------------------------------------------------------------------------
# PREPROCESSING (optional)
# -----------------------------------------------------------------------------
# Named preprocessor definitions. Extractors reference these by name.
# Steps are pass-through to torchvision.transforms.v2.
# See: https://pytorch.org/vision/stable/transforms.html
#
# preprocessors:
#   - name: resnet50_preprocessor
#     steps:
#       - step: Resize
#         params:
#           size: [256, 256]
#           antialias: true
#       - step: CenterCrop
#         params:
#           size: [224, 224]
#       - step: ToDtype
#         params:
#           dtype: float32
#           scale: true
#       - step: Normalize
#         params:
#           mean: [0.485, 0.456, 0.406]
#           std: [0.229, 0.224, 0.225]

# -----------------------------------------------------------------------------
# SELECTIONS (optional)
# -----------------------------------------------------------------------------
# Named selection pipelines. Sources reference these by name.
#
# selections:
#   - name: training_subset
#     steps:
#       - type: Limit
#         params:
#           size: 10000

# -----------------------------------------------------------------------------
# SOURCES — Dataset + optional selection
# -----------------------------------------------------------------------------
# Named source bundles. Tasks reference these by name.
#
# sources:
#   - name: my_dataset_full
#     dataset: my-dataset
#
#   - name: my_dataset_subset
#     dataset: my-dataset
#     selection: training_subset

# -----------------------------------------------------------------------------
# EXTRACTORS — Model + optional preprocessor + batch_size
# -----------------------------------------------------------------------------
# Named extractor bundles. Tasks reference these by name.
#
# extractors:
#   - name: resnet_extractor
#     model: onnx
#     model_path: "./resnet50-v2-7.onnx"
#     output_name: "resnetv24_flatten0_reshape0"
#     preprocessor: resnet50_preprocessor
#     batch_size: 64
#
#   - name: flat_extractor
#     model: flatten
#
#   - name: bovw_extractor
#     model: bovw
#     vocab_size: 2048                 # 256–4096
#     batch_size: 32
#
#   - name: torch_extractor
#     model: torch
#     model_path: "./model.pt"
#     layer_name: "avgpool"            # layer for forward-hook extraction
#     use_output: true                 # capture layer output (True) or input (False)
#     device: cuda:0                   # cpu | cuda:0 | etc.
#
#   - name: uncertainty_extractor
#     model: uncertainty
#     model_path: "./classifier.pt"
#     preds_type: probs                # probs | logits
#     device: cpu

# -----------------------------------------------------------------------------
# WORKFLOWS — Named workflow instances (type + params)
# -----------------------------------------------------------------------------
# Each workflow instance binds a workflow type to specific parameters.
# Tasks reference these instances by name.
#
# workflows:
#   - name: standard_clean
#     type: data-cleaning
#     outlier_method: adaptive
#     outlier_flags: [dimension, pixel, visual]
#
#   - name: strict_clean
#     type: data-cleaning
#     outlier_method: zscore
#     outlier_flags: [dimension, pixel, visual]
#     outlier_threshold: 2.0
#     health_thresholds:
#       exact_duplicates: 0.0
#       near_duplicates: 1.0
#       image_outliers: 1.0
#
#   - name: basic_drift
#     type: drift-monitoring
#     detectors:
#       - method: univariate          # univariate | mmd | domain_classifier | kneighbors
#         test: ks                    # ks | cvm | mwu | anderson | bws
#         p_val: 0.05
#         correction: bonferroni      # bonferroni | fdr
#         classwise: false            # per-class drift detection (requires labels)
#         chunking:                   # optional temporal drift analysis
#           chunk_size: 500           # or chunk_count (mutually exclusive)
#           incomplete: keep          # keep | drop | append

# -----------------------------------------------------------------------------
# TASKS — Lightweight composition by name
# -----------------------------------------------------------------------------
# Each task references a workflow instance, sources, and optional extractor.
#
# tasks:
#   - name: clean_train
#     workflow: standard_clean
#     sources: my_dataset_full
#     output_format: json              # json | yaml | text (default: json)
#     enabled: true                    # set false to skip this task (default: true)
#     cache_dir: /cache                # optional disk cache for embeddings/metadata
#
#   - name: clean_strict
#     workflow: strict_clean
#     sources: my_dataset_full
#     extractor: resnet_extractor
#     output_format: json

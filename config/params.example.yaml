# =============================================================================
# Pipeline Configuration
# =============================================================================
# Schema: PipelineConfig (see src/dataeval_flow/config/models.py)
# Copy to /data/config/params.yaml in container (or use --config CLI option)
#
# yaml-language-server: $schema=params.schema.json
# =============================================================================
#
# Configuration follows a define-once, reference-by-name pattern:
#
#   datasets:    → named dataset definitions
#   models:      → named model/extractor definitions
#   workflows:   → named workflow instances (type + params)
#   tasks:       → lightweight composition by name
#
# Workflow instances bind a workflow type (e.g. "data-cleaning") to a
# specific set of parameters, giving the combination a reusable name.
# Tasks reference workflow instances and resource pools by name —
# keeping tasks lightweight and configs centralized.

# -----------------------------------------------------------------------------
# LOGGING (optional)
# -----------------------------------------------------------------------------
# logging:
#   app_level: DEBUG      # dataeval_flow and container_run (DEBUG|INFO|WARNING|ERROR)
#   lib_level: WARNING    # third-party: torch, datasets, PIL (DEBUG|INFO|WARNING|ERROR)

# -----------------------------------------------------------------------------
# DATASETS
# -----------------------------------------------------------------------------
# Named dataset definitions. Tasks reference these by name.
#
# datasets:
#   - name: my-dataset
#     format: huggingface        # huggingface | image_folder | coco | yolo
#     path: ./data/my-dataset
#     split: train               # HuggingFace only
#
#   - name: raw-photos
#     format: image_folder
#     path: /data/raw-photos
#     recursive: false
#
#   - name: classified-photos
#     format: image_folder
#     path: /data/classified-photos
#     infer_labels: true
#
#   - name: coco-train
#     format: coco
#     path: /data/coco-train
#     annotations_file: annotations.json
#     images_dir: images
#     classes_file: classes.txt
#
#   - name: yolo-train
#     format: yolo
#     path: /data/yolo-train
#     images_dir: images
#     labels_dir: labels
#     classes_file: classes.txt

# -----------------------------------------------------------------------------
# MODELS (optional)
# -----------------------------------------------------------------------------
# Named model/extractor definitions. Tasks reference these by name.
#
# models:
#   - name: resnet50
#     extractor:
#       type: onnx
#       model_path: "./resnet50-v2-7.onnx"
#       output_name: "resnetv24_flatten0_reshape0"
#
#   - name: flat
#     extractor:
#       type: flatten
#
#   - name: bovw_features
#     extractor:
#       type: bovw
#       vocab_size: 2048

# -----------------------------------------------------------------------------
# PREPROCESSING (optional)
# -----------------------------------------------------------------------------
# Named preprocessor definitions. Tasks reference these by name.
# Steps are pass-through to torchvision.transforms.v2.
# See: https://pytorch.org/vision/stable/transforms.html
#
# preprocessors:
#   - name: resnet50_preprocessor
#     steps:
#       - step: Resize
#         params:
#           size: [256, 256]
#           antialias: true
#       - step: CenterCrop
#         params:
#           size: [224, 224]
#       - step: ToDtype
#         params:
#           dtype: float32
#           scale: true
#       - step: Normalize
#         params:
#           mean: [0.485, 0.456, 0.406]
#           std: [0.229, 0.224, 0.225]

# -----------------------------------------------------------------------------
# WORKFLOWS — Named workflow instances (type + params)
# -----------------------------------------------------------------------------
# Each workflow instance binds a workflow type to specific parameters.
# Tasks reference these instances by name.
#
# workflows:
#   - name: standard_clean
#     type: data-cleaning
#     outlier_method: adaptive
#     outlier_flags: [dimension, pixel, visual]
#
#   - name: strict_clean
#     type: data-cleaning
#     outlier_method: zscore
#     outlier_flags: [dimension, pixel, visual]
#     outlier_threshold: 2.0
#     health_thresholds:
#       exact_duplicates: 0.0
#       near_duplicates: 1.0
#       image_outliers: 1.0
#
#   - name: basic_drift
#     type: drift-monitoring
#     detectors:
#       - method: univariate
#         test: ks
#         p_val: 0.05

# -----------------------------------------------------------------------------
# TASKS — Lightweight composition by name
# -----------------------------------------------------------------------------
# Each task references a workflow instance and named datasets/models.
# The workflow instance determines the workflow type and parameters.
#
# tasks:
#   - name: clean_train
#     workflow: standard_clean        # ← reference workflow instance by name
#     datasets: my-dataset
#     output_format: json
#
#   - name: clean_strict
#     workflow: strict_clean          # ← different instance, different params
#     datasets: my-dataset
#     models: resnet50
#     batch_size: 64
#     output_format: json

# JATIC Compliant GitLab CI/CD Pipeline
# Reference: docs/design/JATIC project software requirements.md

# Auto-cancel stale pipelines when new commits are pushed to MRs
# https://gitlab.jatic.net/help/ci/yaml/index.md#workflowauto_cancelon_new_commit
workflow:
  auto_cancel:
    on_new_commit: interruptible

default:
  interruptible: true

stages:
  - lint
  - security
  - test
  - build
  - container
  - release

# GitLab Security Templates [DSOR-1 to DSOR-5]
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  # Container Scanning requires a remote registry, so we disable it for this local-only workflow
  # - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  PYTHON_VERSION: "3.11"
  DOCKER_TLS_CERTDIR: "/certs"

  # Harbor Registry Configuration
  # HARBOR_TOKEN must be set as a CI/CD Variable in GitLab
  HARBOR_URL: "harbor.jatic.net"
  HARBOR_PORT: "443"

  # Target Image Path
  # Used for tagging and pushing to Harbor
  CI_APPLICATION_REPOSITORY: "${HARBOR_URL}:${HARBOR_PORT}/dataeval/dataeval"
  CI_APPLICATION_TAG: "$CI_COMMIT_SHA"

# Shared variant list — edit once, used by all matrix jobs
.variants: &variants
  - VARIANT: [cpu, cu118, cu128]

# -----------------------------------------------------------------------------
# Shared Templates
# -----------------------------------------------------------------------------

# Base template for all uv/nox jobs
.nox:
  image: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-bookworm-slim
  cache:
    key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR
  after_script:
    - uv cache prune --ci

# Shared rule sets
.rules_main_mr:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.rules_mr_only:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.rules_main_only:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# -----------------------------------------------------------------------------
# Lint Stage
# -----------------------------------------------------------------------------

lint:
  extends: [.nox, .rules_main_mr]
  stage: lint
  script:
    - uvx --with nox-uv nox -s lint

# Type Check [TR-7-H-1, TR-7-H-2]
# Type check should be an explicit, visible job in the pipeline, not hidden in lint
type-check:
  extends: [.nox, .rules_main_mr]
  stage: lint
  script:
    - uvx --with nox-uv nox -s type

# -----------------------------------------------------------------------------
# Test Stage [TR-1-H-4: Python 3.10, 3.11, 3.12]
# -----------------------------------------------------------------------------

test:
  extends: [.nox, .rules_main_mr]
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12"]
  script:
    - uvx --with nox-uv nox -s test
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    paths:
      - output/
    reports:
      junit: output/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: output/coverage.xml
    expire_in: 1 week

# -----------------------------------------------------------------------------
# Build Stage
# -----------------------------------------------------------------------------

# Docs preview - Build docs on MRs for review
docs:preview:
  extends: [.nox, .rules_mr_only]
  stage: build
  cache:
    - key:
        files:
          - uv.lock
      paths:
        - $UV_CACHE_DIR
    - key: docs-notebook-cache
      paths:
        - docs/source/notebooks/cache/
  script:
    - uvx --with nox-uv nox -s docs
  artifacts:
    paths:
      - output/docs
    expose_as: "Documentation Preview"
    expire_in: 1 week

# GitLab Pages - Publish Sphinx documentation
pages:
  extends: [.nox, .rules_main_only]
  stage: build
  cache:
    - key:
        files:
          - uv.lock
      paths:
        - $UV_CACHE_DIR
    - key: docs-notebook-cache
      paths:
        - docs/source/notebooks/cache/
  script:
    - uvx --with nox-uv nox -s docs
    - mv output/docs public
  artifacts:
    paths:
      - public

# -----------------------------------------------------------------------------
# Container Stage - Build and Push Docker Images to Harbor
# -----------------------------------------------------------------------------

.container-setup:
  stage: container
  image: docker:25.0.5-git
  variables:
    COSIGN_PASSWORD: ""
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^container/
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^container/
  before_script:
    - echo ${HARBOR_TOKEN} | docker login ${HARBOR_URL}:${HARBOR_PORT}/v2 --username 'robot$dataeval+dataeval-app' --password-stdin
  after_script:
    - docker logout ${HARBOR_URL}:${HARBOR_PORT} || true

# Shared push template with cosign signing
.push-setup:
  extends: .container-setup
  before_script:
    - !reference [.container-setup, before_script]
    - apk add --no-cache cosign

push:docker:
  extends: .push-setup
  parallel:
    matrix: *variants
  script:
    # Skip if this exact image was already pushed for this commit
    - |
      if docker manifest inspect "${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG}-${VARIANT}" > /dev/null 2>&1; then
        echo "Image ${CI_APPLICATION_TAG}-${VARIANT} already exists — skipping build"
        exit 0
      fi

    # Pull previous image for layer cache (speeds up rebuilds)
    - docker pull "${CI_APPLICATION_REPOSITORY}:${VARIANT}" || true

    # Run test stage — fails the job if tests/linting don't pass
    - >-
      docker build --target test
      --cache-from "${CI_APPLICATION_REPOSITORY}:${VARIANT}"
      -f Dockerfile.${VARIANT} .

    # Build production image (clean, no dev deps)
    - >-
      docker build --target prod
      --cache-from "${CI_APPLICATION_REPOSITORY}:${VARIANT}"
      -f Dockerfile.${VARIANT}
      -t ${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG}-${VARIANT}
      -t ${CI_APPLICATION_REPOSITORY}:${VARIANT}
      .
    - docker push ${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG}-${VARIANT}
    - docker push ${CI_APPLICATION_REPOSITORY}:${VARIANT}

    # Sign with cosign
    - printf '%s' "$COSIGN_PRIVATE_KEY_B64" | base64 -d > cosign.key
    - chmod 600 cosign.key
    - docker pull "${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG}-${VARIANT}"
    - IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG}-${VARIANT}")
    - cosign sign --key cosign.key --yes "$IMAGE_DIGEST"
    - rm -f cosign.key

# Verify cosign signatures on pushed images
verify:docker:
  extends: .container-setup
  needs: [push:docker]
  parallel:
    matrix: *variants
  before_script:
    - !reference [.container-setup, before_script]
    - apk add --no-cache cosign
  script:
    - docker pull "${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG}-${VARIANT}"
    - cosign verify --key cosign.pub "${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG}-${VARIANT}"

# Trivy vulnerability scan on pushed images
scan:docker:
  extends: .container-setup
  needs: [push:docker]
  parallel:
    matrix: *variants
  before_script:
    - !reference [.container-setup, before_script]
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
    - curl -sSfL -o junit.tpl https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/junit.tpl
  script:
    - docker pull "${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG}-${VARIANT}"
    - IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG}-${VARIANT}")
    - ./bin/trivy image "${IMAGE_DIGEST}" --scanners vuln --format template --template "@junit.tpl" -o trivy-${VARIANT}.xml --severity HIGH,CRITICAL --exit-code 1 --timeout 30m
  artifacts:
    when: on_failure
    paths:
      - trivy-*.xml
  allow_failure: true

# Container Smoke Test - Validates entrypoint.sh executes correctly
container-test:
  extends: .container-setup
  needs: [push:docker]
  script:
    # Create minimal test config (required mount)
    - mkdir -p /tmp/test-config
    - |
      cat > /tmp/test-config/config.yaml << 'EOF'
      datasets:
        - name: test
          format: huggingface
          path: /data/dataset
          splits: [train]
      EOF

    # Create minimal test dataset (required mount)
    - mkdir -p /tmp/test-dataset
    - echo "test" > /tmp/test-dataset/dummy.txt

    # Pull CPU image from Harbor
    - docker pull ${CI_APPLICATION_REPOSITORY}:cpu

    # Smoke test: Run with --help flag (triggers entrypoint help display)
    - |
      docker run --rm \
        -v /tmp/test-config:/data/config:ro \
        -v /tmp/test-dataset:/data/dataset:ro \
        ${CI_APPLICATION_REPOSITORY}:cpu --help

    - echo "Container smoke test passed"

# -----------------------------------------------------------------------------
# Security Stage [DSOR-1 to DSOR-5]
# -----------------------------------------------------------------------------

# NOTE: Security template jobs use `extends:` internally — do not override with
# `extends:` here or the template's analyzer inheritance chain will break.

# SAST - Static Application Security Testing [DSOR-1-H-1, DSOR-1-H-2]
semgrep-sast:
  stage: security
  variables:
    SAST_EXCLUDED_ANALYZERS: "eslint,gosec,kubesec,nodejs-scan,phpcs-security-audit,pmd-apex,security-code-scan,sobelow,spotbugs"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Dependency Scanning [DSOR-2-H-1, DSOR-2-H-2]
gemnasium-python-dependency_scanning:
  stage: security
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Secret Detection [DSOR-4-H-1, DSOR-4-H-2]
secret_detection:
  stage: security
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# SBOM Export [DSOR-5-H-1]
sbom:
  extends: .rules_main_mr
  stage: security
  # Override entrypoint so GitLab can use shell instead of running syft immediately
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - /usr/local/bin/syft dir:. -o cyclonedx-json=sbom.json
  artifacts:
    paths:
      - sbom.json
    expire_in: 1 week

# -----------------------------------------------------------------------------
# Release Stage
# -----------------------------------------------------------------------------

release:tag:
  extends: .container-setup
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - docker pull ${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG}
    - docker tag ${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG} ${CI_APPLICATION_REPOSITORY}:${CI_COMMIT_TAG}
    - docker push ${CI_APPLICATION_REPOSITORY}:${CI_COMMIT_TAG}

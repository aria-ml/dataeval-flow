# JATIC Compliant GitLab CI/CD Pipeline
# Reference: docs/design/JATIC project software requirements.md

# Auto-cancel stale pipelines when new commits are pushed to MRs
# https://gitlab.jatic.net/help/ci/yaml/index.md#workflowauto_cancelon_new_commit
workflow:
  auto_cancel:
    on_new_commit: interruptible

default:
  interruptible: true

stages:
  - lint
  - security
  - test
  - publish
  - release

# GitLab Security Templates [DSOR-1 to DSOR-5]
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  # Container Scanning requires a remote registry, so we disable it for this local-only workflow
  # - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  PYTHON_VERSION: "3.11"
  DOCKER_TLS_CERTDIR: "/certs"
  FORCE_COLOR: "1"

  # Harbor Registry Configuration
  # HARBOR_TOKEN must be set as a CI/CD Variable in GitLab
  HARBOR_URL: "harbor.jatic.net"

  # Target Image Path
  # Used for tagging and pushing to Harbor
  CI_APPLICATION_REPOSITORY: "${HARBOR_URL}/aria/dataeval"
  # Separate cache repo for buildx registry cache (mode=max)
  CI_CACHE_REPOSITORY: "${HARBOR_URL}/aria/cache"

# Shared variant list — edit once, used by all matrix jobs
.variants: &variants
  - VARIANT: [cpu, cu118, cu128]

# -----------------------------------------------------------------------------
# Shared Templates
# -----------------------------------------------------------------------------

# Base template for all uv/nox jobs
.nox:
  image: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-bookworm-slim
  variables:
    GIT_DEPTH: "0"  # full history so hatch-vcs / poetry-dynamic-versioning can resolve tags
  cache:
    key:
      files:
        - uv.lock
    paths:
      - $UV_CACHE_DIR
  before_script:
    # `uv sync` installs the project, which runs hatch-vcs and needs git.
    - apt-get update -qq && apt-get install -y --no-install-recommends git
    - git fetch --tags
  after_script:
    - uv cache prune --ci

# Shared rule sets
.rules_main_mr:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.rules_mr_only:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.rules_main_only:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Run only when dependency-defining files change (or on main). Used to gate
# the install-validation jobs so they don't run on docs/code-only MRs.
.rules_main_mr_deps:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        paths:
          - pyproject.toml
          - uv.lock
          - poetry.lock
          - environment.yml
          - requirements.txt

# -----------------------------------------------------------------------------
# Lint Stage
# -----------------------------------------------------------------------------

lint:
  extends: [.nox, .rules_main_mr]
  stage: lint
  script:
    - uvx --with nox-uv nox -s lint

# Type Check [TR-7-H-1, TR-7-H-2]
# Type check should be an explicit, visible job in the pipeline, not hidden in lint
type-check:
  extends: [.nox, .rules_main_mr]
  stage: lint
  script:
    - uvx --with nox-uv nox -s type

# Schema Validation - Ensure params.schema.json is up to date
schema:
  extends: [.nox, .rules_main_mr]
  stage: lint
  script:
    - uvx --with nox-uv nox -s schema

# -----------------------------------------------------------------------------
# Test Stage [TR-1-H-4: Python 3.10, 3.11, 3.12]
# -----------------------------------------------------------------------------

test:
  extends: [.nox, .rules_main_mr]
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12"]
  script:
    - uvx --with nox-uv nox -s test
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    paths:
      - output/
    reports:
      junit: output/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: output/coverage.xml
    expire_in: 1 week

# Minimum-dependencies + no-optional-extras smoke test
# [TR-1-H-4] verify supported Python versions & dep min/max
# [TR-2-H-3] test without optional deps
# [TR-2-H-5] test against documented dep versions
# [TR-8-H-1] features usable independently
#
# Pins Python to the minimum supported version (3.10) and resolves every
# direct dependency to its lowest declared version (--resolution=lowest-direct).
# Only the `cpu` extra is installed so torch/torchvision are available; `onnx`,
# `opencv`, and `app` are deliberately omitted, and tests/app is skipped because
# its conftest imports textual unconditionally.
deps:
  extends: [.nox, .rules_main_mr]
  stage: test
  variables:
    PYTHON_VERSION: "3.10"
  script:
    - uvx --with nox-uv nox -s deps

# -----------------------------------------------------------------------------
# Install Validation [SR-3-H-2..5, SR-5-H-1, SR-5-H-2]
# Verifies the project installs cleanly via every documented toolchain.
# Runs only when dependency-defining files change.
# -----------------------------------------------------------------------------

# Validate uv.lock + poetry.lock are both up-to-date with pyproject.toml
install:lock:
  extends: [.nox, .rules_main_mr_deps]
  stage: test
  script:
    - uvx --with nox-uv nox -s check

# Validate `pip install .[cpu]` from a source checkout.
# `git` + full history are required so hatch-vcs can derive __version__ from
# tags when the hatchling build hook runs inside pip.
install:pip:
  extends: [.rules_main_mr_deps]
  stage: test
  image: python:${PYTHON_VERSION}-slim
  variables:
    PYTHON_VERSION: "3.11"
    GIT_DEPTH: "0"
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends git
    - git fetch --tags
  script:
    - python -m venv /tmp/venv-pip
    - /tmp/venv-pip/bin/pip install --upgrade pip
    - /tmp/venv-pip/bin/pip install ".[cpu]" --extra-index-url https://download.pytorch.org/whl/cpu
    - /tmp/venv-pip/bin/python -c "import dataeval_flow; print('dataeval_flow', dataeval_flow.__version__)"
    - /tmp/venv-pip/bin/dataeval-flow --help

# Validate `poetry install` from a source checkout (uses committed poetry.lock).
install:poetry:
  extends: [.rules_main_mr_deps]
  stage: test
  image: python:${PYTHON_VERSION}-slim
  variables:
    PYTHON_VERSION: "3.11"
    POETRY_VIRTUALENVS_IN_PROJECT: "true"
    POETRY_NO_INTERACTION: "1"
  script:
    - pip install --quiet "poetry>=2.2.0"
    - poetry install --extras cpu
    - poetry run python -c "import dataeval_flow; print('dataeval_flow', dataeval_flow.__version__)"
    - poetry run dataeval-flow --help

# Validate `conda env create -f environment.yml` (uses committed environment.yml).
# `git` is required so hatch-vcs can derive __version__ during `pip install -e`.
# The micromamba image runs as a non-root user (mambauser) and does not include
# git; install it from conda-forge (unprivileged-friendly) instead of apt.
install:conda:
  extends: [.rules_main_mr_deps]
  stage: test
  image: mambaorg/micromamba:2-ubuntu24.04
  variables:
    PYTHON_VERSION: "3.11"
  before_script:
    - eval "$(micromamba shell hook --shell bash)"
    - micromamba create -f environment.yml -n dataeval-flow python=$PYTHON_VERSION
    - micromamba activate dataeval-flow
    # Install git into the active env so it's on PATH for `git fetch` and for
    # the hatchling build subprocess invoked by `pip install -e` (which
    # inherits the active env's PATH).
    - micromamba install -y -c conda-forge git
    # Workspace is owned by the GitLab runner UID, not mambauser → mark safe
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git fetch --tags
    # Install the project itself (conda manages base deps, but the package isn't on conda-forge)
    # Plus the cpu extra so torch is available for the smoke test
    - pip install --quiet -e ".[cpu]"
    - micromamba list
  script:
    - python -c "import dataeval_flow; print('dataeval_flow', dataeval_flow.__version__)"
    - dataeval-flow --help

# -----------------------------------------------------------------------------
# Documentation — runs in parallel with container jobs
# -----------------------------------------------------------------------------

# Docs preview - Build docs on MRs for review
docs:preview:
  extends: [.nox, .rules_mr_only]
  stage: publish
  cache:
    - key:
        files:
          - uv.lock
      paths:
        - $UV_CACHE_DIR
    - key: docs-notebook-cache
      paths:
        - docs/source/notebooks/cache/
  script:
    - uvx --with nox-uv nox -s docs
  artifacts:
    when: always
    paths:
      - output/docs
    expose_as: "Documentation Preview"
    expire_in: 1 week

# GitLab Pages - Publish Sphinx documentation
pages:
  extends: [.nox, .rules_main_only]
  stage: publish
  cache:
    - key:
        files:
          - uv.lock
      paths:
        - $UV_CACHE_DIR
    - key: docs-notebook-cache
      paths:
        - docs/source/notebooks/cache/
  script:
    - uvx --with nox-uv nox -s docs
    - mv output/docs public
  artifacts:
    # Upload on failure too — `nox -s docs` writes notebook error tracebacks to
    # output/docs/reports/**/*.err.log; on failure the `mv` above never runs, so
    # we include output/docs alongside public to surface those logs.
    when: always
    paths:
      - public
      - output/docs

# -----------------------------------------------------------------------------
# Container — runs in parallel with documentation jobs
# -----------------------------------------------------------------------------

.container-setup:
  stage: publish
  image: docker:25.0.5-git
  variables:
    COSIGN_PASSWORD: ""
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+/
  before_script:
    # `docker:25.0.5-git` is Alpine — no bash by default. docker/resolve-version.sh
    # uses bash-only features (`[[ =~ ]]`, `BASH_REMATCH`), so install bash for
    # every job that extends this template.
    - apk add --no-cache bash
    - echo ${HARBOR_TOKEN} | docker login ${HARBOR_URL} --username 'robot$aria+aria-bot' --password-stdin
  after_script:
    - docker logout ${HARBOR_URL} || true

# Shared push template with cosign signing
.push-setup:
  extends: .container-setup
  variables:
    GIT_DEPTH: "0"  # full history so `git describe --tags` resolves a real version
  before_script:
    - !reference [.container-setup, before_script]
    # `jq` is used downstream by release:sbom to extract the CycloneDX predicate
    # from the cosign attestation envelope; harmless to install everywhere.
    - apk add --no-cache cosign git jq
    - git fetch --tags
    # Set up buildx builder for registry cache support (docker-container driver required for type=registry)
    - docker buildx create --use --name ci-builder || true

push:docker:
  extends: .push-setup
  parallel:
    matrix: *variants
  script:
    # Resolve PEP 440 + OCI-safe versions from git tags (hatch-vcs source of truth)
    - eval "$(./docker/resolve-version.sh)"
    - IMMUTABLE_TAG="${DATAEVAL_FLOW_IMAGE_TAG}-${VARIANT}"
    - echo "Building dataeval-flow ${DATAEVAL_FLOW_VERSION} → ${CI_APPLICATION_REPOSITORY}:${IMMUTABLE_TAG}"

    # Run test stage — fails the job if tests/linting don't pass
    - >-
      docker buildx build --target test
      --build-arg DATAEVAL_FLOW_VERSION="${DATAEVAL_FLOW_VERSION}"
      --cache-from type=registry,ref=${CI_CACHE_REPOSITORY}:${VARIANT}
      --cache-to type=registry,ref=${CI_CACHE_REPOSITORY}:${VARIANT},mode=max,image-manifest=true
      -f docker/Dockerfile.${VARIANT} .

    # Build + push immutable, version-stamped image only. Floating tags
    # (:edge-${VARIANT} on main, :${VARIANT} on release) are gated by scans
    # and applied later by promote:floating.
    - >-
      docker buildx build --target prod
      --build-arg DATAEVAL_FLOW_VERSION="${DATAEVAL_FLOW_VERSION}"
      --cache-from type=registry,ref=${CI_CACHE_REPOSITORY}:${VARIANT}
      -f docker/Dockerfile.${VARIANT}
      -t ${CI_APPLICATION_REPOSITORY}:${IMMUTABLE_TAG}
      --push .

    # Sign with cosign (imagetools inspect fetches digest from registry — buildx --push doesn't load locally)
    - printf '%s' "$COSIGN_PRIVATE_KEY_B64" | base64 -d > cosign.key
    - chmod 600 cosign.key
    - DIGEST=$(docker buildx imagetools inspect "${CI_APPLICATION_REPOSITORY}:${IMMUTABLE_TAG}" --raw | sha256sum | awk '{print "sha256:"$1}')
    - cosign sign --key cosign.key --yes "${CI_APPLICATION_REPOSITORY}@${DIGEST}"

    # Per-image SBOM [CS-2-H-4]: generate from the actual pushed image (by
    # digest) and attach to the registry as a CycloneDX cosign attestation.
    # The same SBOM is also kept as a CI artifact for record-keeping and as
    # the source the release:sbom job republishes with permanent retention.
    - apk add --no-cache curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - syft "${CI_APPLICATION_REPOSITORY}@${DIGEST}" -o cyclonedx-json=sbom-${VARIANT}.json
    - cosign attest --key cosign.key --type cyclonedx --predicate sbom-${VARIANT}.json --yes "${CI_APPLICATION_REPOSITORY}@${DIGEST}"
    - rm -f cosign.key
  artifacts:
    paths:
      - sbom-*.json
    expire_in: 30 days

# Verify cosign signatures + SBOM attestation on pushed images
verify:docker:
  extends: .container-setup
  needs: [push:docker]
  parallel:
    matrix: *variants
  variables:
    GIT_DEPTH: "0"  # full history so resolve-version.sh can `git describe --tags`
  before_script:
    - !reference [.container-setup, before_script]
    - apk add --no-cache cosign
    - eval "$(./docker/resolve-version.sh)"
    - export IMMUTABLE_TAG="${DATAEVAL_FLOW_IMAGE_TAG}-${VARIANT}"
  script:
    - docker pull "${CI_APPLICATION_REPOSITORY}:${IMMUTABLE_TAG}"
    - cosign verify --key docker/cosign.pub "${CI_APPLICATION_REPOSITORY}:${IMMUTABLE_TAG}"
    # Verify the CycloneDX SBOM attestation [CS-2-H-4]
    - cosign verify-attestation --key docker/cosign.pub --type cyclonedx "${CI_APPLICATION_REPOSITORY}:${IMMUTABLE_TAG}" > /dev/null

    # Smoke test: verify the container actually boots
    - docker run --rm "${CI_APPLICATION_REPOSITORY}:${IMMUTABLE_TAG}" --help

# Trivy vulnerability scan on pushed images [DSOR-3-H-1, DSOR-3-H-2, CS-2-H-2, CS-2-H-3]
# - Pinned to v0.62.0 per CS-2-H-2 minimum (download.sh would otherwise pick
#   the latest at every run; a CLI regression could silently break the gate).
# - `allow_failure: false` (default) — HIGH/CRITICAL CVEs block promote:floating
#   so dirty images never get a floating tag (:edge-${VARIANT} or :${VARIANT}).
# - Triage via [.trivyignore](.trivyignore); every entry must carry the
#   Justification / Upstream / Re-evaluate header per SECURITY.md (DSOR-1-H-3).
# - Reports retained on every run (CS-2-H-3) and exposed as JUnit for the
#   GitLab MR view; expanded MEDIUM coverage is roadmapped for v0.3.0.
scan:docker:
  extends: .container-setup
  needs: [push:docker]
  parallel:
    matrix: *variants
  variables:
    GIT_DEPTH: "0"  # full history so resolve-version.sh can `git describe --tags`
    TRIVY_VERSION: "0.62.0"
  before_script:
    - !reference [.container-setup, before_script]
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b ./bin v${TRIVY_VERSION}
    - curl -sSfL -o junit.tpl https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/junit.tpl
    - eval "$(./docker/resolve-version.sh)"
    - export IMMUTABLE_TAG="${DATAEVAL_FLOW_IMAGE_TAG}-${VARIANT}"
  script:
    - docker pull "${CI_APPLICATION_REPOSITORY}:${IMMUTABLE_TAG}"
    - IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${CI_APPLICATION_REPOSITORY}:${IMMUTABLE_TAG}")
    - ./bin/trivy image "${IMAGE_DIGEST}" --scanners vuln --format template --template "@junit.tpl" -o trivy-${VARIANT}.xml --severity HIGH,CRITICAL --exit-code 1 --timeout 30m --ignorefile .trivyignore
  artifacts:
    when: always
    paths:
      - trivy-*.xml
    reports:
      junit: trivy-*.xml
    expire_in: 30 days

# -----------------------------------------------------------------------------
# Security Stage [DSOR-1 to DSOR-5]
# -----------------------------------------------------------------------------

# NOTE: Security template jobs use `extends:` internally — do not override with
# `extends:` here or the template's analyzer inheritance chain will break.

# SAST - Static Application Security Testing [DSOR-1-H-1, DSOR-1-H-2]
semgrep-sast:
  stage: security
  variables:
    SAST_EXCLUDED_ANALYZERS: "eslint,gosec,kubesec,nodejs-scan,phpcs-security-audit,pmd-apex,security-code-scan,sobelow,spotbugs"
    SAST_EXCLUDED_PATHS: "config, docker, docs, output, tests"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Dependency Scanning [DSOR-2-H-1, DSOR-2-H-2]
gemnasium-python-dependency_scanning:
  stage: security
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Secret Detection [DSOR-4-H-1, DSOR-4-H-2]
secret_detection:
  stage: security
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# SBOM Export [DSOR-5-H-1]
sbom:
  extends: .rules_main_mr
  stage: security
  # Override entrypoint so GitLab can use shell instead of running syft immediately
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - /usr/local/bin/syft dir:. -o cyclonedx-json=sbom.json
  artifacts:
    paths:
      - sbom.json
    expire_in: 1 week

# -----------------------------------------------------------------------------
# Release Stage — promote the immutable, scan-cleared image to a floating tag.
# -----------------------------------------------------------------------------

# Promote a scan-cleared immutable tag to its floating tag:
#   main pipeline    → :edge-${VARIANT}
#   release pipeline → :${VARIANT}
# Server-side retag via `imagetools create` — no pull/rebuild. The underlying
# digest is already cosign-signed by push:docker, so signatures cover all tags.
promote:floating:
  extends: .push-setup
  stage: release
  needs: [push:docker, verify:docker, scan:docker]
  parallel:
    matrix: *variants
  script:
    - eval "$(./docker/resolve-version.sh)"
    - IMMUTABLE_TAG="${DATAEVAL_FLOW_IMAGE_TAG}-${VARIANT}"
    - |
      if [[ -n "${CI_COMMIT_TAG:-}" ]]; then
        FLOATING_TAG="${VARIANT}"
      else
        FLOATING_TAG="edge-${VARIANT}"
      fi
    - echo "Promoting ${IMMUTABLE_TAG} → ${FLOATING_TAG}"
    - docker buildx imagetools create
      -t ${CI_APPLICATION_REPOSITORY}:${FLOATING_TAG}
      ${CI_APPLICATION_REPOSITORY}:${IMMUTABLE_TAG}

# Per-version SBOM release artifact [CS-2-H-4]
# Downloads the CycloneDX cosign attestation written by push:docker (digest-
# addressed, so it follows the immutable tag through promote:floating) and
# republishes it as a versioned release artifact with permanent retention.
# Tag-only — main pipelines already retain the 30-day artifact from push:docker.
release:sbom:
  extends: .push-setup
  stage: release
  needs: [push:docker, verify:docker, scan:docker]
  parallel:
    matrix: *variants
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+/
  script:
    - eval "$(./docker/resolve-version.sh)"
    - IMMUTABLE_TAG="${DATAEVAL_FLOW_IMAGE_TAG}-${VARIANT}"
    - DIGEST=$(docker buildx imagetools inspect "${CI_APPLICATION_REPOSITORY}:${IMMUTABLE_TAG}" --raw | sha256sum | awk '{print "sha256:"$1}')
    - cosign download attestation --predicate-type https://cyclonedx.org/bom "${CI_APPLICATION_REPOSITORY}@${DIGEST}"
        | jq -r '.payload' | base64 -d | jq '.predicate' > sbom-${DATAEVAL_FLOW_VERSION}-${VARIANT}.json
  artifacts:
    paths:
      - sbom-*.json
    expire_in: never

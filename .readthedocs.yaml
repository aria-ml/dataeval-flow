# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  apt_packages:
    - graphviz
  jobs:
    post_checkout:
      # Fetch pre-executed notebook cache so RTD renders from cache instead of
      # re-running notebooks (which times out). See docs/CACHE_MANAGEMENT.md.
      - bash docs/fetch-docs-cache.sh
    create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
      - UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv sync --extra=cpu --extra=app --extra=onnx --extra=opencv --group=docs
    install:
      - "true"

# Build documentation in the "docs/source" directory with Sphinx
sphinx:
  configuration: docs/source/conf.py
